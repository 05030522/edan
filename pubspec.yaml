name: eden_app
description: "에덴 - 매일 5분, 에덴에서 만나요. 기독교 성경 묵상 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.2

  # Local Storage
  shared_preferences: ^2.3.4

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.1.4
  uuid: ^4.5.1

  # Social Login
  flutter_appauth: ^8.0.0+1
  crypto: ^3.0.6
  url_launcher: ^6.3.1

  # Image Picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/sounds/
