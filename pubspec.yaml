name: eden_app
description: "에덴 - 매일 5분, 에덴에서 만나요. 기독교 성경 묵상 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.2

  # Local Storage
  shared_preferences: ^2.3.4

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.1.4
  uuid: ^4.5.1

  # Social Login
  flutter_appauth: ^8.0.0+1
  crypto: ^3.0.6
  url_launcher: ^6.3.1

  # Image Picker
  image_picker: ^1.1.2
  http: ^1.6.0

  # Crash Reporting & Analytics
  sentry_flutter: ^9.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/sounds/

# ─── 앱 아이콘 자동 생성 설정 ───
# 사용: dart run flutter_launcher_icons
# 참고: 현재 루양.png는 크림색 배경. 완전한 투명 배경은 별도 이미지 에디터로
#       배경 제거 후 assets/images/icon_luyang.png로 저장 → image_path 변경.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/루양.png"
  min_sdk_android: 21
  # 안드로이드 어댑티브 아이콘 (Android 8.0+)
  adaptive_icon_background: "#B8D4BE"  # 에덴 그린 (브랜드)
  adaptive_icon_foreground: "assets/images/루양.png"
  # 웹 favicon
  web:
    generate: true
    image_path: "assets/images/루양.png"
    background_color: "#FDF6ED"  # 새벽빛 (라이트 모드 배경)
    theme_color: "#B8D4BE"
