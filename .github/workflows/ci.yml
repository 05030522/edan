name: CI - Analyze & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Format check
        run: dart format --set-exit-if-changed lib/
      - name: Build web
        run: flutter build web --dart-define=FLUTTER_BASE_HREF='/edan/' --no-tree-shake-icons
