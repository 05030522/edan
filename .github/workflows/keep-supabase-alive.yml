name: Keep Supabase Alive

# 5일마다 실행 (7일 제한 전에 충분한 여유)
on:
  schedule:
    - cron: '0 9 */5 * *'  # 5일마다 오전 9시 (UTC) 실행
  workflow_dispatch: # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep alive
        run: |
          echo "Pinging Supabase to prevent auto-pause..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1")

          echo "Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Supabase is alive!"
          else
            echo "Warning: Supabase returned status $HTTP_STATUS"
            exit 1
          fi
