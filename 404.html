<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/edan/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="매일 5분, 에덴에서 만나요. 기독교 성경 묵상 앱">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="에덴">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>에덴</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // OAuth 콜백 처리: auth/callback 경로면 토큰을 보존하면서 앱 루트로 리다이렉트
    (function() {
      var path = window.location.pathname;
      var hash = window.location.hash;
      if (path.indexOf('auth/callback') !== -1 || hash.indexOf('access_token') !== -1) {
        // access_token이 hash에 있으면 앱 루트로 리다이렉트 (토큰 보존)
        window.location.replace('/edan/' + hash);
        return;
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
